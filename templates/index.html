<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff9fb;
            color: #333;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background-color: #4a90e2;
            padding: 20px;
            overflow-y: auto;
            height: 100vh;
            color: white;
        }

        .chat-history {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .chat-history li {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            word-wrap: break-word;
        }

        .user-message { font-weight: bold; }
        .bot-message { color: #ffeb99; }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            margin-bottom: 20px;
        }

        button {
            background-color: #93c5ff;
            color: rgb(13, 8, 8);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #357ab7;
        }
    </style>
    <script>
        async function sendMessage(event) {
            event.preventDefault();
            let userInput = document.getElementById("user_input").value;
            if (!userInput) return;

            // Send message to FastAPI server
            let response = await fetch("/chat", {
                method: "POST",
                body: new URLSearchParams({ user_input: userInput }),
                headers: { "Content-Type": "application/x-www-form-urlencoded" }
            });

            let data = await response.json();

            // Update chat history
            let chatHistory = document.querySelector(".chat-history");
            chatHistory.innerHTML = "";

            data.chat_history.forEach(chat => {
                let messageElement = document.createElement("li");
                messageElement.className = chat.role === "user" ? "user-message" : "bot-message";
                messageElement.textContent = chat.message;
                chatHistory.appendChild(messageElement);
            });

            document.getElementById("user_input").value = "";
        }
    </script>
</head>
<body>
    <!-- Sidebar for chat history -->
    <div class="sidebar">
        <h2>Chat History</h2>
        <ul class="chat-history">
            {% for chat in chat_history %}
                <li class="{{ 'user-message' if chat.role == 'user' else 'bot-message' }}">
                    {{ chat.message }}
                </li>
            {% endfor %}
        </ul>
    </div>

    <!-- Chat Form -->
    <div class="chat-container">
        <h1>ChatBot</h1>
        <form onsubmit="sendMessage(event)">
            <label for="user_input">Enter your input:</label>
            <input type="text" id="user_input" name="user_input" placeholder="Type your message here..." required>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
