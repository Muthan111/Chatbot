
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            margin: 0;
            background-color: #fff9fb;
            font-family: Arial, sans-serif;
            color: #333;
        }

        h1 {
            color: #4a90e2;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px #aaa;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            font-size: 18px;
            margin-bottom: 10px;
            color: #555;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #93c5ff;
            outline: none;
        }

        button {
            background-color: #93c5ff;
            color: rgb(13, 8, 8);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #357ab7;
        }

        button:active {
            transform: scale(0.98);
        }

        p {
            padding-top: 30px;
            font-size: 18px;
            width: 50%;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>ChatBot</h1>
    <form action="/" method="post">
        <label for="user_input">Enter your input:</label>
        <input type="text" id="user_input" name="user_input" placeholder="Type your message here...">
        <button type="submit">Submit</button>
    </form>
    {% if response_data %}
        <p>{{ response_data }}</p>
    {% endif %}
</body>
</html>
