<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            width: 250px;
            background-color: #56c05b;
            color: rgb(0, 0, 0);
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            margin-bottom: 20px;
        }
        .chat-list {
            list-style: none;
            padding: 0;
            flex-grow:1;
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }
        .chat-list li {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }
        .chat-list li:hover {
            background-color: #333;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .input-box {
            display: flex;
            padding: 10px;
            background-color: white;
            border-top: 1px solid #ddd;
        }
        .input-box input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }
        .input-box button {
            padding: 10px 20px;
            border: none;
            background-color: #12970e68;
            color: white;
            cursor: pointer;
        }
        .createNewChat {
            padding: 10px;
            background-color: #ffffff;
            color: rgb(0, 0, 0);
            cursor: pointer;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Chats</h2>
        <ul class="chat-list" id="chatList">
            
        </ul>
        <button class="createNewChat" onclick="createNewChat()">Create New Chat</button>
    </div>
    <div class="main-content">
        <div class="chat-box" id="chatBox">
            <p>Select a chat to start...</p>
        </div>
        <div class="chat-box" id="history">
            <p>Chat History:</p>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let selectedChatName = null; // Replace with the actual chat name if dynamic
        async function selectChat(chatName) {
            // document.getElementById("chatBox").innerHTML = `<p><strong>${chatName}</strong></p>`;
            selectedChatName = chatName;
            
            try {
            // Call the backend API
            const response = await fetch(`/getChat?chatname=${encodeURIComponent(chatName)}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },
            });
            const chatHistory = await fetch(`/getChatHistory?chatname=${encodeURIComponent(chatName)}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },
            });

            if (!response.ok) {
                throw new Error('Failed to fetch chat data');
            }

            const data = await response.json();
            const chatHistoryData = await chatHistory.json();
            console.log(chatHistoryData);

            // Update the chat box with the response
            document.getElementById("chatBox").innerHTML = `<p><strong>${chatName}</strong></p>`;
            if (data.messages) {
                data.messages.forEach(message => {
                    document.getElementById("chatBox").innerHTML += `<p>${message}</p>`;
                });
            }
            const historyElement = document.getElementById("history");
            historyElement.innerHTML = "";
            if (Array.isArray(chatHistoryData)) {
            chatHistoryData.forEach(message => {
                const formattedMessage = `<p><strong>${message.role}:</strong> ${message.message}</p>`;
                historyElement.innerHTML += formattedMessage;
            });
        }
            else {
                historyElement.innerHTML = "<p>No chat history available.</p>";
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById("chatBox").innerHTML = `<p>Error loading chat</p>`;
        }
        }
        // function sendMessage() {
        //     const userInput = document.getElementById("userInput").value;
        //     if (!userInput) return;
            
        //     const chatBox = document.getElementById("chatBox");
        //     const userMessage = `<p><strong>You:</strong> ${userInput}</p>`;
        //     chatBox.innerHTML += userMessage;
        //     document.getElementById("userInput").value = "";
        // }
        let chatCounter = 1
        async function sendMessage() {
            try {
                const userInput = document.getElementById("userInput").value;

                if (!userInput) {
                    alert("Please enter a message.");
                    return;
                }

                // Check if a chat is selected
                if (!selectedChatName) {
                    // If no chat is selected, create a new chat
                    const createChatResponse = await fetch(`/createChat`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    });

                    if (!createChatResponse.ok) {
                        throw new Error('Failed to create a new chat');
                    }

                    const newChat = await createChatResponse.json();
                    selectedChatName = newChat.chatName; // Assuming the response contains a `chatName` field

                    // Update the chat list with the new chat
                    const chatList = document.getElementById("chatList");
                    const newChatElement = document.createElement("li");
                    newChatElement.textContent = selectedChatName;
                    newChatElement.onclick = () => selectChat(selectedChatName);
                    chatList.appendChild(newChatElement);
                    chatCounter++; // Increment the counter for the next chat
                }

                // Construct the URL with query parameters
                const url = `/interactWithChat?chatname=${encodeURIComponent(selectedChatName)}&message=${encodeURIComponent(userInput)}`;

                // Call the backend API
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (!response.ok) {
                    throw new Error('Failed to interact with chat');
                }

                const data = await response.json();

                // Update the chat box with the response
                const chatBox = document.getElementById("chatBox");
                chatBox.innerHTML += `<p><strong>You:</strong> ${userInput}</p>`;
                chatBox.innerHTML += `<p><strong>Bot:</strong> ${data.botResponse}</p>`;

                // Clear the input field
                document.getElementById("userInput").value = "";
            } catch (error) {
                console.error('Error:', error);
                document.getElementById("chatBox").innerHTML += `<p>Error interacting with chat</p>`;
            }
        }

        // Send message to the model
        async function displayChatHistory(chatName){
            selectedChatName = chatName;
            try {
                const response = await fetch(`/getChatHistory?chatname=${encodeURIComponent(chatName)}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },});

                if (!response.ok) {
                    throw new Error('Failed to fetch chat data');
                }

                const data = await response.json();
                console.log(data);
                document.getElementById("chatBox").innerHTML = ``;
                if (data.messages) {
                    data.messages.forEach(message => {
                    // Format the message with role and content
                    const formattedMessage = `<p><strong>${message.role}:</strong> ${message.message}</p>`;
                    document.getElementById("chatBox").innerHTML += formattedMessage;
                    });
                }

            }
            catch (error) {
                console.error('Error:', error);
                document.getElementById("chatBox").innerHTML = `<p>Error loading chat</p>`;
            }
        }
        
        async function createNewChat() {
            
            
            // Call the backend API
            const response = await fetch(`/createChat`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },
            });

            if (!response.ok) {
                throw new Error('Failed to create chat');
            }
            const chatName = `Chat${chatCounter}`
             // Increment the counter for the next chat
            // Update the chat list
            const chatList = document.getElementById("chatList");
            const existingChats = Array.from(chatList.children).map(chat => chat.textContent);
            if (existingChats.includes(chatName)) {
                chatCounter++; // Increment the counter again if the chat name already exists
                // chatName = `Chat${chatCounter}`;
                console.log(chatName);
                console.log(chatCounter);
                console.log("for if statement");

                // Update the chat list
                const newChat = document.createElement("li");
                newChat.textContent = chatName;
                newChat.onclick = () => selectChat(chatName);
                chatList.appendChild(newChat);
            }
            else {
                const chatName = `Chat${chatCounter}`;
                
                console.log(chatName);
                console.log(chatCounter);
                console.log("for else statement");
                chatCounter++
                const newChat = document.createElement("li");
                newChat.textContent = chatName;
                newChat.onclick = () => selectChat(chatName);
                chatList.appendChild(newChat);
            }

            
        }
    </script>
</body>
</html>
